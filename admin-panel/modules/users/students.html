<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <div class="d-flex">
        <div class="container-fluid p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold">Student Management</h3>
                <button class="btn btn-primary px-4"><i class="bi bi-plus-lg"></i> Register New</button>
            </div>

            <div class="card">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead>
                                <tr>
                                    <th class="ps-4">Name</th>
                                    <th>Email</th>
                                    <th>Mobile</th>
                                    <th>Reg. Date</th>
                                    <th>Coins</th>
                                    <th class="text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="studentsTable">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>

async function loadStudents(){

    const response = await fetch("http://localhost:8087/api/auth/students");
    const students = await response.json();

    const table = document.getElementById("studentsTable");

    table.innerHTML = "";

    students.forEach(student => {

        if(student.role !== "STUDENT") return;

        const row = `
        <tr>
            <td class="ps-4 fw-semibold">${student.fullname}</td>
            <td>${student.email}</td>
            <td>${student.mobile}</td>
            <td>-</td>
            <td><span class="badge bg-success-subtle text-success px-3">0</span></td>
            <td class="text-center">
                <button class="btn btn-light btn-sm me-2">
                    <i class="bi bi-clock-history text-primary"></i>
                </button>
                <button class="btn btn-light btn-sm">
                    <i class="bi bi-chair text-danger"></i>
                </button>
            </td>
        </tr>
        `;

        table.innerHTML += row;

    });

}

loadStudents();

</script>
</body>
</html>
