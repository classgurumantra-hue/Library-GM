<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LibManage Pro | Enterprise Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="assets/ css/style.css">
</head>
<body id="appBody">

    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <aside class="sidebar">
        <div class="sidebar-header">Admin<span class="text-primary">.</span></div>
        <nav class="mt-3">
            <div class="nav-link" onclick="toggleDrop('userDropdown')">
                <i class="bi bi-people-fill"></i> <span class="ms-2">User</span> 
                <i class="bi bi-chevron-down ms-auto small"></i>
            </div>
            <div id="userDropdown" style="display: block;">
                <div onclick="render('students')" class="sub-link active" id="l-students">Registered Students</div>
                <div onclick="render('admin')" class="sub-link" id="l-admin">Admin Profile</div>
                <div onclick="render('subadmin')" class="sub-link" id="l-subadmin">Subadmin</div>
                <div onclick="render('coadmin')" class="sub-link" id="l-coadmin">Co Admin</div>
                <div onclick="render('vendor')" class="sub-link" id="l-vendor">Vendor</div>
                <div onclick="render('canteen-man')" class="sub-link" id="l-canteen-man">Canteen Manager</div>
            </div>

            <div class="nav-link" onclick="toggleDrop('libDropdown')">
                <i class="bi bi-book-half"></i> <span class="ms-2">Library</span> 
                <i class="bi bi-chevron-down ms-auto small"></i>
            </div>
            <div id="libDropdown" style="display: block;">
                <div onclick="render('create-zone')" class="sub-link" id="l-create-zone">Create Zone</div>
                <div onclick="render('create-centre')" class="sub-link" id="l-create-centre">Create Centres</div>
                <div onclick="render('create-section')" class="sub-link" id="l-create-section">Create Section</div>
                <div onclick="render('create-shift')" class="sub-link" id="l-create-shift">Create Shift</div>
                <div onclick="render('booking-history')" class="sub-link" id="l-booking-history">Booking History List</div>
            </div>
            
            <div class="nav-link" onclick="render('lib-courses')">
                <i class="bi bi-mortarboard-fill"></i> <span class="ms-2">Library with courses</span>
            </div>

            <div class="nav-link" onclick="render('notes-affairs')">
                <i class="bi bi-journal-text"></i> <span class="ms-2">Notes & Current Affairs</span>
            </div>

            <div class="nav-link" onclick="render('locker')">
                <i class="bi bi-safe2-fill"></i> <span class="ms-2">Locker</span>
            </div>

            <div class="nav-link" onclick="render('canteen')">
                <i class="bi bi-cup-hot-fill"></i> <span class="ms-2">Canteen</span>
            </div>
        </nav>
    </aside>

    <main id="main-wrapper">
        <header class="top-nav justify-content-between">
            <button class="btn d-lg-none" onclick="toggleSidebar()"><i class="bi bi-list fs-3"></i></button>
            <div class="ms-auto d-flex align-items-center">
                <div class="text-end me-3">
                    <p class="mb-0 fw-bold small">Super Admin</p>
                    <small class="text-muted" style="font-size: 10px;">Indore, India</small>
                </div>
                <div class="bg-primary text-white rounded-3 d-flex align-items-center justify-content-center fw-bold" style="width:40px; height:40px">AD</div>
            </div>
        </header>
        <div id="mainContent" class="p-3 p-md-4 p-lg-5"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
