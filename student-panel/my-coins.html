<!DOCTYPE html>
<html>
<head>
  <title>My Coins</title>
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/coins.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
  <div id="navbar"></div>
<div class="coins-new">

  <!-- Wallet Card -->
  <div class="wallet-card">
    <p>Total Wallet Balance</p>
    <h1 id="mainCoins">0</h1>
  </div>

  <!-- Tabs -->
  <div class="history-tabs">
    <button class="tab-btn active" onclick="showTab('credit')">Credit</button>
    <button class="tab-btn" onclick="showTab('debit')">Debit</button>
  </div>


<div id="historyContainer" class="history-container">
</div>

</div>
<script>
fetch("components/navbar.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("navbar").innerHTML = data;
  });
</script>

<script src="assets/js/navbar.js"></script>
<script src="assets/js/coins.js"></script>
</body>
</html>
