<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <title>Choose Centre</title>
  <link rel="stylesheet" href="assets/css/centres.css">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/responsive.css">

</head>
<body>
<div id="navbar"></div>



<div class="page">

  <h1 class="page-title">Choose Your Centre</h1>
  <p class="subtitle">Select the best library near you</p>

  <div class="container mt-4">
      <div id="centreList" class="row justify-content-center"></div>
  </div>

</div>

<script>
fetch("components/navbar.html")
.then(res => res.text())
.then(data => {
    document.getElementById("navbar").innerHTML = data;
    updateVendorNavbar();
});
</script>


<script>
document.addEventListener("DOMContentLoaded", function(){

    const role = localStorage.getItem("role");

    const centreList = document.getElementById("centreList");
    centreList.innerHTML = "";

    // ---------- VENDOR FLOW ----------
    if(role === "VENDOR"){

        const centreId = localStorage.getItem("selectedZoneId");

        fetch(`http://localhost:8087/api/centres/${centreId}`)
        .then(res => res.json())
        .then(centre => {

            const div = document.createElement("div");
            div.className = "col-md-4 mb-4";

            div.innerHTML = `
            <div class="card shadow border-0 h-100">

                <img src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f"
                     style="height:180px;width:100%;object-fit:cover">

                <div class="card-body text-center">

                    <h5>${centre.centreName}</h5>

                    <p class="text-muted small">
                        ${centre.description || "Study centre"}
                    </p>

                    <p class="fw-bold text-primary">
                        Admission Fee: ₹${centre.admissionFee || 0}
                    </p>

                    <button class="btn btn-primary"
                    onclick="goSection('${centre.id}','${centre.centreName}')">
                    Continue
                    </button>

                </div>
            </div>
            `;

            centreList.appendChild(div);

        });

    }

    // ---------- STUDENT FLOW ----------
    else{

        const zoneId = localStorage.getItem("selectedZoneId");
        if(!zoneId) return;

        fetch(`http://localhost:8087/api/centres/zone/${zoneId}`)
        .then(res => res.json())
        .then(data => {

            data.forEach(centre => {

                const div = document.createElement("div");
                div.className = "col-md-4 mb-4";

                div.innerHTML = `
                <div class="card shadow border-0 h-100">

                    <img src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f"
                         style="height:180px;width:100%;object-fit:cover">

                    <div class="card-body text-center">

                        <h5>${centre.centreName}</h5>

                        <p class="text-muted small">
                            ${centre.description || "Study centre"}
                        </p>

                        <p class="fw-bold text-primary">
                            Admission Fee: ₹${centre.admissionFee || 0}
                        </p>

                        <button class="btn btn-primary"
                        onclick="goSection('${centre.id}','${centre.centreName}')">
                        Continue
                        </button>

                    </div>
                </div>
                `;

                centreList.appendChild(div);
            });

        });

    }

});
</script>
<script src="assets/js/main.js"></script>
</body>
</html>
