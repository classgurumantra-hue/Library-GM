<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Choose Centre</title>
  <link rel="stylesheet" href="assets/css/centres.css">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/responsive.css">

</head>
<body>
<div id="navbar"></div>

<div id="navbar"></div>

<div class="page">

  <h1 class="page-title">Choose Your Centre</h1>
  <p class="subtitle">Select the best library near you</p>

  <div class="container mt-4">
      <div id="centreList" class="row"></div>
  </div>

</div>

<script>
fetch("components/navbar.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("navbar").innerHTML = data;
  });
</script>


<script>
document.addEventListener("DOMContentLoaded", function(){

    const zoneId = localStorage.getItem("zoneId");
    if(!zoneId) return;

    fetch(`http://localhost:8087/api/centres/zone/${zoneId}`)
    .then(res => res.json())
    .then(data => {

        const centreList = document.getElementById("centreList");
        if(!centreList) return;

        centreList.innerHTML = "";

        data.forEach(centre => {

            const div = document.createElement("div");
            div.className = "col-md-4 mb-4";

            div.innerHTML = `
            <div class="card shadow border-0 h-100">

                <img src="https://source.unsplash.com/400x250/?library,study"
                     style="height:180px;width:100%;object-fit:cover">

                <div class="card-body text-center">

                    <h5>${centre.centreName}</h5>

                    <p class="text-muted small">
                        ${centre.description || "Study centre"}
                    </p>

                    <p class="fw-bold text-primary">
                        Admission Fee: ₹${centre.admissionFee || 0}
                    </p>

                    <button class="btn btn-success btn-sm"
                        onclick="goSection('${centre.centreName}')">
                        Continue
                    </button>

                </div>
            </div>
            `;

            centreList.appendChild(div);
        });

    });

});
</script>
<script src="assets/js/main.js"></script>
</body>
</html>
