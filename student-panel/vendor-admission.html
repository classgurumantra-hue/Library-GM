<!DOCTYPE html>
<html>
<head>
<title>Vendor Admission</title>
<link href="assets/css/main.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex justify-content-center align-items-center vh-100 bg-light">

<div class="card p-4 shadow" style="width:400px">

<h4 class="text-center mb-3">Vendor Take Admission</h4>

<label class="form-label">Student Registered Email</label>

<input type="email" id="studentEmail" class="form-control mb-3" placeholder="Enter student email">

<button class="btn btn-primary w-100" onclick="verifyStudent()">
Verify Student
</button>

</div>

<script>

async function verifyStudent(){

    const email = document.getElementById("studentEmail").value;

    if(!email){
        alert("Enter student email");
        return;
    }

    const res = await fetch(`http://localhost:8087/api/auth/check-email?email=${email}`);
    const data = await res.json();

    if(!data.exists){
        alert("Student not registered");
        return;
    }

    // save student email
    localStorage.setItem("vendorStudentEmail", email);

    // next step
    window.location.href = "zones.html";

}

</script>
</body>
</html>
