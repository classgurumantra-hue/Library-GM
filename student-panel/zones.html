<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Choose Zone</title>
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/responsive.css">

</head>

<style>
.zone-card{
    border-radius:18px;
    transition:0.3s;
    cursor:pointer;
    box-shadow:0 0 12px rgba(0,0,0,0.08);
    padding:20px;
    height:100%;
}

.zone-card:hover{
    transform:translateY(-6px);
}

.zone-title{
    font-weight:600;
}

.zone-desc{
    font-size:14px;
    color:#6c757d;
}
</style>
<body>

<div id="navbar"></div>

<div class="container mt-4">
    <h4 class="mb-4">Choose Zone</h4>
    <div id="zoneList" class="row card-grid"></div>
</div>

<script>
fetch("components/navbar.html")
.then(res => res.text())
.then(data => {
    document.getElementById("navbar").innerHTML = data;
});
</script>

<script src="assets/js/main.js"></script>

</body>
</body>
</html>
