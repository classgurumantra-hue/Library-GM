<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | GM Library</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link href="assets/css/login.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/responsive.css">

</head>
<body>
<div id="navbar"></div>

<div class="login-wrapper">
  <div class="login-card">
    <h3>Welcome back</h3>
    <p class="subtitle">Enter your email and password to sign in</p>

    <div class="form-group">
  <label>Email</label>
  <input type="email" id="loginEmail" placeholder="Email">
</div>

<div class="form-group">
  <label>Password</label>
  <input type="password" id="loginPassword" placeholder="Password">
</div>

<button class="btn-login" onclick="login()">Sign in</button>
    <p class="bottom-text">
      Don't have an account?
      <a href="register.html">Sign up</a>
    </p>

    <a class="forgot" href="forgot-password.html">Forgot Password</a>
  </div>
</div>

<script>
fetch("components/navbar.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("navbar").innerHTML = data;
  });
</script>


<script>
async function login(){

    let email = document.getElementById("loginEmail").value;
    let password = document.getElementById("loginPassword").value;

    if(email === "" || password === ""){
        alert("Enter email and password");
        return;
    }

    try{

        let response = await fetch("http://localhost:8087/api/auth/login",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                username: email,
                password: password
            })
        });

        let data = await response.json();

        if(response.ok){
            alert(data.message);
            window.location.href="index.html";
        }
        else{
            alert(data.message);
        }

    }catch(err){
        alert("Login failed");
    }
}
</script>
</body>
</html>
