<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | GM Library</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link href="assets/css/login.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/responsive.css">

</head>
<body>
<div id="navbar"></div>

<div class="login-wrapper">
  <div class="login-card">
    <h3>Welcome back</h3>
    <p class="subtitle">Enter your email and password to sign in</p>

    <div class="form-group">
  <label>Email</label>
  <input type="email" id="loginEmail" placeholder="Email" autocomplete="off">
</div>

<div class="form-group">
  <label>Password</label>
  <input type="password" id="loginPassword" placeholder="Password" autocomplete="new-password">
</div>

<button class="btn-login" onclick="login()">Sign in</button>
    <p class="bottom-text">
      Don't have an account?
      <a href="register.html">Sign up</a>
    </p>

    <a class="forgot" href="forgot-password.html">Forgot Password</a>
  </div>
</div>

<script>
fetch("components/navbar.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("navbar").innerHTML = data;
  });
</script>


<script>
async function login(){

console.log("LOGIN FUNCTION STARTED");

    let email = document.getElementById("loginEmail").value;
    let password = document.getElementById("loginPassword").value;

    if(email === "" || password === ""){
        alert("Enter email and password");
        return;
    }

    try{

let response = await fetch("http://89.116.34.84:8087/api/auth/login",{
    method:"POST",
    headers:{
        "Content-Type":"application/json"
    },
    body: JSON.stringify({
        email: email,
        password: password
    })
});

        let data = await response.json();

        console.log("STATUS:", response.status);
console.log("RESPONSE:", data);
if(response.ok){

    alert(data.message);

    // 🔥 SAVE COMMON DATA
    localStorage.setItem("role", data.role);
    localStorage.setItem("userId", data.userId);

    // 🔥 ADMIN + COADMIN → admin panel
    if(
      data.role === "ADMIN" ||
      data.role === "SUB_ADMIN" ||
      data.role === "CO_ADMIN"
    ){
        window.location.href="../admin-panel/index.html";
    }

    // 🔥 STUDENT + VENDOR → student panel
    else{
        if(data.role === "STUDENT"){
            localStorage.setItem("studentId", data.userId);
        }

        if(data.role === "VENDOR"){
            localStorage.setItem("vendorId", data.userId);
            localStorage.setItem("vendorName", data.fullname);
        }

        window.location.href="index.html";
    }

}
        else{
            alert(data.message);
        }

    }catch(err){
        alert("Login failed");
    }
}
</script>
</body>
</html>
