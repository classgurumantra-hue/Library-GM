<!DOCTYPE html>
<html>
<head>

<title>Verify Admission</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body>

<div class="container mt-5">

<h3 class="mb-4">Admission Verification</h3>

<div class="card p-4">

<p><b>Vendor:</b> <span id="vendor"></span></p>
<p><b>Zone:</b> <span id="zone"></span></p>
<p><b>Centre:</b> <span id="centre"></span></p>
<p><b>Section:</b> <span id="section"></span></p>
<p><b>Shift:</b> <span id="shift"></span></p>
<p><b>Seat:</b> <span id="seat"></span></p>

<button id="acceptBtn" class="btn btn-success mt-3">
Accept Admission
</button>

</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const vendor = params.get("vendor");
const zone = params.get("zone");
const centre = params.get("centre");
const section = params.get("section");
const shift = params.get("shift");
const seat = params.get("seat");
const email = params.get("email");

console.log("PARAMS:", window.location.search);
console.log("EMAIL:", email);

document.getElementById("vendor").innerText = vendor || "-";
document.getElementById("zone").innerText = zone || "-";
document.getElementById("centre").innerText = centre || "-";
document.getElementById("section").innerText = section || "-";
document.getElementById("shift").innerText = shift || "-";
document.getElementById("seat").innerText = seat || "-";

document.getElementById("acceptBtn").onclick = async function(){

    if(!email){
        alert("Invalid verification link");
        return;
    }

    try{

        const res = await fetch(
            "http://localhost:8087/api/admissions/accept?email=" + encodeURIComponent(email),
            { method:"POST" }
        );

      if(res.ok){

        console.log("BOOKING DATA:", {
    seatId: localStorage.getItem("selectedSeat"),
    shiftId: localStorage.getItem("selectedShiftId"),
    studentId: localStorage.getItem("studentId"),
    vendorId: localStorage.getItem("vendorId")
});



    alert("Admission accepted successfully");

localStorage.setItem("selectedSeat", seat);
localStorage.setItem("selectedCentre", centre);
localStorage.setItem("selectedZone", zone);

// ⭐ Payment page ke liye booking data save
const bookingData = {
    zone: zone,
    centre: centre,
    time: shift,
    seat: seat,
    mrp: localStorage.getItem("seatMRP") || 0,
    price: localStorage.getItem("finalPrice") || 0,
    finalPrice: localStorage.getItem("finalPrice") || 0
};

localStorage.setItem("bookingData", JSON.stringify(bookingData));

localStorage.setItem("selectedShiftId", params.get("shiftId"));
localStorage.setItem("studentId", params.get("studentId"));
localStorage.setItem("centreId", params.get("centreId"));

// shiftId already stored from seats page

    window.location.href = "payment.html";
}

    }catch(err){
        console.log(err);
        alert("Server error");
    }

}

</script>
</body>
</html>
