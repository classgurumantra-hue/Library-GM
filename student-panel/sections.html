<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Choose Section</title>

  <link rel="stylesheet" href="assets/css/sections.css">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/responsive.css">

</head>
<body>

<div id="navbar"></div>

<div class="container">
  <h2>Choose Your Section</h2>
  <p class="subtitle">Select your preferred hall</p>

  <div class="card-grid row justify-content-center"></div>

</div>

<script>
/* Navbar Load */
fetch("components/navbar.html")
.then(res => res.text())
.then(data => {
    document.getElementById("navbar").innerHTML = data;
});
</script>

<script>
/* Section Fetch + Card Render */
document.addEventListener("DOMContentLoaded", function(){

    const centreId = localStorage.getItem("centreId");

    if(!centreId) return;

    fetch(`http://localhost:8087/api/sections/centre/${centreId}`)
    .then(res => res.json())
    .then(sections => {

        const grid = document.querySelector(".card-grid");

        if(!grid) return;

        grid.innerHTML = "";

        sections.forEach(section => {

            const card = document.createElement("div");
            card.className = "card col-md-4 mb-3 shadow border-0";

            card.innerHTML = `
                <img src="https://images.unsplash.com/photo-1588072432836-e10032774350?w=800"
                class="thumb">

                <div class="card-body text-center">

                    <h3>${section.name}</h3>

                    <p>
                    Seat Range:
                    ${section.startSeatNumber} - ${section.endSeatNumber}
                    </p>

                    <button class="btn btn-success btn-sm select-section-btn">
                    Choose Section
                    </button>

                </div>
            `;

            /* Click Event */
            card.querySelector("button").addEventListener("click", () => {

    localStorage.setItem("selectedSectionId", section.id);

    window.location.href = "shifts.html";

});

            grid.appendChild(card);

        });

    });

});
</script>

<script src="assets/js/sections.js"></script>
<script src="assets/js/main.js"></script>


</body>
</html>
