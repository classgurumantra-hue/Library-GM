<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GM Library | Payment</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="assets/css/payment.css">
<link rel="stylesheet" href="assets/css/main.css">
<link rel="stylesheet" href="assets/css/responsive.css">

</head>

<body>

<div id="navbar"></div>

<div class="payment-wrapper">

<h2>Complete Your Payment</h2>
<p class="sub"></p>

<div class="pay-card">

<h5>Booking Details</h5>

<!-- Dynamic Booking Summary -->
<div class="row booking-summary"></div>


<!-- Coupon -->
<h5>Apply Coupon</h5>
<div class="coupon-box">
<input type="text" id="couponCode" placeholder="Enter coupon">
<button onclick="applyCoupon()">Apply</button>
</div>

<!-- Coins -->
<h5>Use GM Coins</h5>
<div class="coin-box">
<label><input type="radio" name="coin"> Yes</label>
<label><input type="radio" name="coin" checked> No</label>
<input type="number" id="coinInput" placeholder="Edit coin amount" oninput="applyCoins()">
</div>

<!-- Final Amount -->
<div class="final-box">
<div><span>Subtotal</span><span>₹<span id="subtotalAmount">0</span></span></div>
<div><span>Coupon</span><span>₹<span id="couponAmount">0</span></span></div>
<div><span>Coins</span><span>₹<span id="coinAmount">0</span></span></div>

<div><span>Commission</span><span>₹<span id="commissionAmount">0</span></span></div>
<div><span>Vendor Payable</span><span>₹<span id="vendorPayableAmount">0</span></span></div>

<div><span>Payable</span><span>₹<span id="payableAmount">0</span></span></div>
</div>

<!-- Payment Methods -->


<button class="pay-btn proceed-payment">
    Pay ₹<span id="payAmount">0</span>
</button>

</div>
</div>

<script>
fetch("components/navbar.html")
.then(res => res.text())
.then(data => {
document.getElementById("navbar").innerHTML = data;
});
</script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="assets/js/payment.js" defer></script>

</body>
</html>
