<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Choose Zone</title>
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/responsive.css">

</head>
<body>
<div id="navbar"></div>

<div class="page">
  <h1 class="page-title">Choose Your Zone</h1>

  <div class="card-grid">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f">
      <h3>Indore</h3>
      <p>Best study zone in Indore city.</p>
      <button onclick="goCentre('Indore')">Continue</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1503676260728-1c00da094a0b">
      <h3>Bhopal</h3>
      <p>Silent environment for focus.</p>
      <button onclick="goCentre('Bhopal')">Continue</button>
    </div>

  </div>
</div>

<script>
fetch("components/navbar.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("navbar").innerHTML = data;
  });
</script>

<script src="assets/js/main.js"></script>
</body>
</html>
